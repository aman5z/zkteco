# ZKTeco Attendance Dashboard - Configuration File
# Edit this file to change settings without modifying server.py
# Lines starting with # are comments

[devices]
# Comma-separated list of ZKTeco device IP addresses
ips = 10.20.141.21, 10.20.141.22, 10.20.141.23, 10.20.141.24, 10.20.141.25, 10.20.141.26, 10.20.141.27, 10.20.141.28, 10.20.141.29
port = 4370
# Socket connection timeout (seconds) — keep low so offline devices fail fast
timeout = 25
# Max time (seconds) to wait for a full attendance download per device.
# Devices with 600+ users and months of records need 120–300 seconds.
pull_timeout = 120

[server]
# Port the dashboard runs on
port = 5000
# How often to refresh attendance data (minutes)
cache_refresh_mins = 5

[database]
# Leave blank to auto-detect .mdb in same folder, or set full path
# mdb_path = C:\Backups\att2000.mdb
mdb_path =

[departments]
# Departments excluded from absent/present tracking
exclude = DELETED EMPLOYEES, TRANSPORT, GAES, GULF ASIAN ENGLISH SCHOOL
# Departments collapsed by default in employee list
collapsed = DELETED EMPLOYEES, TRANSPORT, GAES, GULF ASIAN ENGLISH SCHOOL
# Display order in reports (others appear after)
order = ADMIN, SUPPORT, TEACHING, CONDUCTOR, DRIVER, CLEANING STAFF

[sessions]
# Session lifetime in days
lifetime_days = 7
# Auto-logout after inactivity (minutes). 0 = disabled
admin_inactivity_mins = 60
employee_inactivity_mins = 20

[app]
# Version string shown in UI
version = 2.2
# Default admin password (only used when creating fresh dashboard_users.json)
default_admin_password = Gaesous180

[telegram]
# Telegram bot token (from @BotFather)
bot_token =
# Chat ID to send messages to (group/channel/private chat)
chat_id =
# Master switch — set to 1 to enable
enabled = 1
# Notify when a device goes online or offline
notify_device_status = 1
# Notify on every punch (IP, time, employee code) — may be noisy on busy devices
notify_punches = 1
# Send daily absent report XLSX at the configured time
notify_daily_report = 1
# Time to send the daily report (24-hour)
daily_report_hour   = 8
daily_report_minute = 10
