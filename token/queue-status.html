<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>حالة دورك | Your Queue Status</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --accent: #4f8ef7;
    --accent2: #7c6ff7;
    --success: #22d3a0;
    --warn: #f7c94f;
    --danger: #f87171;
    --text: #e8eaf0;
    --muted: #6b7280;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100vh; background: var(--bg); font-family: 'IBM Plex Sans Arabic', sans-serif; color: var(--text); }
  body {
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(79,142,247,0.10) 0%, transparent 70%);
  }

  .wrap { max-width: 480px; margin: 0 auto; padding: 24px 16px 48px; }

  /* Header */
  .header { text-align: center; padding: 24px 0 20px; }
  .logo-box {
    width: 60px; height: 60px; margin: 0 auto 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    box-shadow: 0 6px 24px rgba(79,142,247,0.3);
  }
  .school-name { font-size: 17px; font-weight: 700; }
  .school-sub { font-size: 12px; color: var(--muted); direction: ltr; font-family: 'IBM Plex Mono', monospace; margin-top: 3px; }

  /* Token hero */
  .token-hero {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 24px;
    text-align: center;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .token-hero::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .your-token-label { font-size: 12px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
  .token-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 72px; font-weight: 600; line-height: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .token-dept { font-size: 15px; color: var(--muted); margin-top: 8px; }

  /* Status ring */
  .status-ring {
    width: 120px; height: 120px; margin: 24px auto;
    border-radius: 50%; position: relative;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
  }
  .ring-svg { position: absolute; top:0; left:0; width:100%; height:100%; transform: rotate(-90deg); }
  .ring-bg   { fill:none; stroke: var(--border); stroke-width: 6; }
  .ring-fill { fill:none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round;
    transition: stroke-dashoffset 1s ease, stroke 0.5s; }
  .ring-fill.done   { stroke: var(--success); }
  .ring-fill.called { stroke: var(--warn); animation: ringPulse 1s ease-in-out infinite; }
  @keyframes ringPulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
  .ring-inner { position: relative; text-align: center; }
  .ring-pos   { font-family: 'IBM Plex Mono', monospace; font-size: 32px; font-weight: 600; }
  .ring-sub   { font-size: 11px; color: var(--muted); }

  /* Status badge */
  .status-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px; border-radius: 20px;
    font-size: 14px; font-weight: 600;
    margin-top: 8px;
  }
  .badge-waiting  { background: rgba(79,142,247,0.12); color: var(--accent); border: 1px solid rgba(79,142,247,0.25); }
  .badge-called   { background: rgba(247,201,79,0.12); color: var(--warn);   border: 1px solid rgba(247,201,79,0.3); animation: badgePulse 1s infinite; }
  .badge-done     { background: rgba(34,211,160,0.12); color: var(--success); border: 1px solid rgba(34,211,160,0.3); }
  .badge-skipped  { background: rgba(248,113,113,0.10); color: var(--danger);  border: 1px solid rgba(248,113,113,0.25); }
  @keyframes badgePulse { 0%,100%{opacity:1;} 50%{opacity:0.7;} }

  .status-dot { width:8px; height:8px; border-radius:50%; }
  .dot-waiting { background: var(--accent); animation: pulse 2s infinite; }
  .dot-called  { background: var(--warn);   animation: pulse 0.8s infinite; }
  .dot-done    { background: var(--success); }
  .dot-skipped { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  /* Info card */
  .info-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    margin-bottom: 16px;
  }
  .info-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .info-row:last-child { border-bottom: none; }
  .info-label { font-size: 13px; color: var(--muted); }
  .info-val   { font-size: 14px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; }

  /* Wait estimate */
  .wait-est {
    background: rgba(247,201,79,0.08); border: 1px solid rgba(247,201,79,0.2);
    border-radius: 12px; padding: 16px 20px; text-align: center; margin-bottom: 16px;
  }
  .wait-est .big { font-size: 36px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; color: var(--warn); }
  .wait-est .lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* Called banner */
  .called-banner {
    background: linear-gradient(135deg, rgba(247,201,79,0.15), rgba(247,201,79,0.05));
    border: 1.5px solid rgba(247,201,79,0.4);
    border-radius: var(--radius);
    padding: 24px; text-align: center; margin-bottom: 16px;
    animation: bannerPop 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
    display: none;
  }
  .called-banner.show { display: block; }
  @keyframes bannerPop { from{transform:scale(0.9);opacity:0;} to{transform:scale(1);opacity:1;} }
  .called-banner .icon { font-size: 48px; margin-bottom: 12px; }
  .called-banner .title { font-size: 22px; font-weight: 700; color: var(--warn); margin-bottom: 6px; }
  .called-banner .sub { font-size: 14px; color: var(--muted); }

  /* Refresh info */
  .refresh-info {
    text-align: center; font-size: 12px; color: var(--muted);
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .refresh-dot { width:6px; height:6px; border-radius:50%; background: var(--success); animation: pulse 2s infinite; }

  /* Not found */
  .not-found { text-align: center; padding: 48px 20px; color: var(--muted); }
  .not-found .icon { font-size: 48px; margin-bottom: 16px; }
  .btn-back {
    margin-top: 24px; padding: 12px 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 12px; color: #fff;
    font-size: 15px; font-weight: 600;
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    cursor: pointer; text-decoration: none; display: inline-block;
  }

  .en { direction: ltr; display: inline-block; }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="logo-box">🏫</div>
    <div class="school-name">مدرستك</div>
    <div class="school-sub">YOUR SCHOOL NAME</div>
  </div>

  <div id="mainContent">
    <div class="not-found">
      <div class="icon">⏳</div>
      <div>جاري التحميل... / Loading...</div>
    </div>
  </div>

  <div class="refresh-info" style="margin-top:16px;">
    <span class="refresh-dot"></span>
    <span>يتحدث تلقائياً كل 10 ثوانٍ <span class="en">/ Auto-refreshes every 10s</span></span>
  </div>

</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbyxhqVi3BPh_ksWRJ5n9TWLGBK8HbEhxqqwqV4Bfft7VJJlGxRWI9PPS4Zhw_aKN1TOQQ/exec';

  const DEPT_NAMES_AR = {
    REG: 'المسجل / Registrar',
    TRP: 'النقل / Transport',
    TC:  'مسؤول TC / TC Incharge',
    AD:  'المدير المساعد / Asst Director',
    FIN: 'الشؤون المالية / Finance',
  };

  // Get token from URL: ?token=R-07
  const params = new URLSearchParams(window.location.search);
  const myToken = (params.get('token') || '').toUpperCase();
  const myDept  = params.get('dept') || '';

  let lastStatus = null;

  function renderStatus(data) {
    // data: array of rows for the dept
    // Find our token row
    const row = data.find(r => r[0] === myToken);

    if (!row) {
      document.getElementById('mainContent').innerHTML = `
        <div class="not-found">
          <div class="icon">🔍</div>
          <div style="font-size:17px;font-weight:600;margin-bottom:8px;">لم يتم العثور على الرقم</div>
          <div style="font-size:13px;">Token not found: ${myToken}</div>
          <a class="btn-back" href="token-form.html">← طلب رقم جديد / New Token</a>
        </div>`;
      return;
    }

    const status = row[7]; // WAITING, PRIORITY, CALLED, DONE, SKIPPED
    const dept   = row[1];
    const name   = row[3] || '';
    const reason = row[6] || '';
    const issuedAt = row[8] ? new Date(row[8]) : null;

    // Count position
    const today = new Date().toISOString().slice(0,10);
    const waiting = data.filter(r =>
      (r[7]==='WAITING'||r[7]==='PRIORITY') && String(r[8]).startsWith(today)
    ).sort((a,b) => new Date(a[8])-new Date(b[8]));
    const myPos = waiting.findIndex(r=>r[0]===myToken);
    const ahead = myPos; // 0-based, so "ahead" count
    const total = waiting.length;

    const waitMins = ahead * 5; // rough estimate: ~5 min per token

    // ring progress: 0 = many ahead, 1 = you're next
    const progress = total <= 1 ? 1 : Math.max(0, 1 - (ahead / total));
    const circumference = 2 * Math.PI * 54;
    const offset = circumference * (1 - progress);

    const ringClass = status === 'CALLED' ? 'called' : status === 'DONE' ? 'done' : '';

    let statusBadge = '';
    let posContent  = '';

    if (status === 'CALLED') {
      statusBadge = `<span class="status-badge badge-called"><span class="status-dot dot-called"></span>يتم نداؤك الآن! / Being Called!</span>`;
      posContent  = `<div class="ring-pos" style="color:var(--warn)">!</div><div class="ring-sub">Now!</div>`;
    } else if (status === 'DONE') {
      statusBadge = `<span class="status-badge badge-done"><span class="status-dot dot-done"></span>تمت الخدمة / Served</span>`;
      posContent  = `<div class="ring-pos" style="color:var(--success)">✓</div><div class="ring-sub">Done</div>`;
    } else if (status === 'SKIPPED') {
      statusBadge = `<span class="status-badge badge-skipped"><span class="status-dot dot-skipped"></span>تم التخطي / Skipped</span>`;
      posContent  = `<div class="ring-pos" style="color:var(--danger)">✗</div><div class="ring-sub">Skipped</div>`;
    } else {
      statusBadge = `<span class="status-badge badge-waiting"><span class="status-dot dot-waiting"></span>في الانتظار / Waiting</span>`;
      posContent  = `
        <div class="ring-pos">${ahead === 0 ? '1' : ahead}</div>
        <div class="ring-sub">${ahead === 0 ? 'التالي / Next' : 'أمامك / ahead'}</div>`;
    }

    // Play notification on status change
    if (lastStatus && lastStatus !== status && status === 'CALLED') {
      try { new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbr4E9GCgrTGmnv8ql').play(); } catch(e){}
    }
    lastStatus = status;

    const calledBanner = status === 'CALLED' ? 'show' : '';

    document.getElementById('mainContent').innerHTML = `
      <div class="called-banner ${calledBanner}">
        <div class="icon">🔔</div>
        <div class="title">حان دورك! / Your Turn!</div>
        <div class="sub">توجه إلى ${DEPT_NAMES_AR[dept]||dept}<br><span class="en">Please proceed to the counter</span></div>
      </div>

      <div class="token-hero">
        <div class="your-token-label">رقم دورك / Your Token</div>
        <div class="token-num">${myToken}</div>
        <div class="token-dept">${DEPT_NAMES_AR[dept] || dept}</div>

        <div class="status-ring">
          <svg class="ring-svg" viewBox="0 0 120 120">
            <circle class="ring-bg"   cx="60" cy="60" r="54"/>
            <circle class="ring-fill ${ringClass}" cx="60" cy="60" r="54"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${offset}"/>
          </svg>
          <div class="ring-inner">${posContent}</div>
        </div>

        ${statusBadge}
      </div>

      ${(status==='WAITING'||status==='PRIORITY') && ahead > 0 ? `
      <div class="wait-est">
        <div class="big">~${waitMins}</div>
        <div class="lbl">دقيقة تقريباً / minutes estimated wait</div>
      </div>` : ''}

      <div class="info-card">
        ${name ? `<div class="info-row">
          <span class="info-label">ولي الأمر / Parent</span>
          <span class="info-val">${name}</span>
        </div>` : ''}
        <div class="info-row">
          <span class="info-label">الجهة / Department</span>
          <span class="info-val">${DEPT_NAMES_AR[dept]||dept}</span>
        </div>
        ${reason ? `<div class="info-row">
          <span class="info-label">السبب / Reason</span>
          <span class="info-val" style="font-family:inherit;font-size:13px;">${reason}</span>
        </div>` : ''}
        ${issuedAt ? `<div class="info-row">
          <span class="info-label">وقت الإصدار / Issued</span>
          <span class="info-val">${issuedAt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</span>
        </div>` : ''}
        <div class="info-row">
          <span class="info-label">في الانتظار / Waiting</span>
          <span class="info-val">${total} شخص / ${total} person${total!==1?'s':''}</span>
        </div>
      </div>

      ${status==='DONE' ? `<div style="text-align:center;margin-top:8px;">
        <a class="btn-back" href="token-form.html">طلب رقم جديد / New Token</a>
      </div>` : ''}
    `;
  }

  async function refresh() {
    if (!myToken) {
      document.getElementById('mainContent').innerHTML = `
        <div class="not-found">
          <div class="icon">🔗</div>
          <div style="font-size:17px;font-weight:600;margin-bottom:8px;">لا يوجد رقم دور</div>
          <div style="font-size:13px;margin-bottom:16px;">No token specified in URL</div>
          <a class="btn-back" href="token-form.html">← احصل على رقم / Get Token</a>
        </div>`;
      return;
    }

    try {
      const res = await fetch(GAS_URL, {
        method:'POST',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body: new URLSearchParams({action:'getQueue', dept: myDept})
      });
      const data = await res.json();
      if (Array.isArray(data)) renderStatus(data);
    } catch(err) {
      console.error('Refresh error:', err);
    }
  }

  refresh();
  setInterval(refresh, 10000);
</script>
</body>
</html>
