<!DOCTYPE html>
<html data-theme="dark">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔢</text></svg>">
<meta charset="UTF-8">
<title>Token Counter System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ── DARK THEME (default) ── */
[data-theme="dark"]{
  --bg:        #000000;
  --surface:   #0f172a;
  --card:      #1e293b;
  --border:    #334155;
  --text:      #f1f5f9;
  --subtext:   #94a3b8;
  --input-bg:  #0f172a;
  --input-text:#f1f5f9;
  --accent:    #3b82f6;
  --accent2:   #2563eb;
  --token-clr: #22c55e;
  --logout:    #ef4444;
}

/* ── LIGHT THEME ── */
[data-theme="light"]{
  --bg:        #f0f4ff;
  --surface:   #e8eeff;
  --card:      #ffffff;
  --border:    #c7d2fe;
  --text:      #1e1b4b;
  --subtext:   #6b7280;
  --input-bg:  #f8fafc;
  --input-text:#1e1b4b;
  --accent:    #6366f1;
  --accent2:   #4f46e5;
  --token-clr: #7c3aed;
  --logout:    #ef4444;
}

body{
  font-family:Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  transition:background 0.3s, color 0.3s;
}

.container{max-width:1100px;margin:auto;padding:20px;}

/* ── TOP BAR ── */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  background:transparent;
  position:sticky;
  top:0;
  z-index:100;
}
#clock{
  font-size:15px;
  color:var(--subtext);
  font-variant-numeric:tabular-nums;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
}

/* ── THEME TOGGLE ── */
#themeBtn{
  width:42px;height:42px;
  border-radius:50%;
  border:2px solid var(--border);
  background:var(--card);
  color:var(--text);
  font-size:20px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.4s ease, background 0.3s;
}
#themeBtn:hover{background:var(--accent);color:#fff;}
#themeBtn.spin{animation:spinOnce 0.5s ease;}
@keyframes spinOnce{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.card{
  background:var(--card);
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  border:1px solid var(--border);
  transition:background 0.3s, border 0.3s;
}

h2,h3{margin-bottom:15px;color:var(--text);}

input{
  padding:10px;
  border-radius:8px;
  border:1px solid var(--border);
  margin:5px 0;
  width:100%;
  background:var(--input-bg);
  color:var(--input-text);
  font-size:15px;
  transition:border 0.2s;
}
input:focus{outline:none;border-color:var(--accent);}

button{
  padding:9px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:var(--accent);
  color:#fff;
  margin-top:6px;
  font-size:14px;
  transition:background 0.2s, transform 0.1s;
}
button:hover{background:var(--accent2);}
button:active{transform:scale(0.97);}

.logout{background:var(--logout);float:right;}
.logout:hover{background:#dc2626;}
.admin-only{display:none}

table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{padding:10px;border-bottom:1px solid var(--border);text-align:left;color:var(--text);}
th{color:var(--subtext);font-size:13px;text-transform:uppercase;}

.token-number{font-weight:bold;color:var(--token-clr);font-size:22px;letter-spacing:2px;}

/* ── LOGIN BOX ── */
#loginBox{max-width:400px;margin:60px auto;}

.input-wrap{position:relative;margin:5px 0;}
.input-wrap input{padding-right:42px;margin:0;}
.eye-btn{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:var(--subtext);font-size:18px;padding:0;margin:0;
}
.eye-btn:hover{color:var(--accent);}

.remember-row{display:flex;align-items:center;gap:8px;margin:10px 0;font-size:14px;color:var(--subtext);}
.remember-row input{width:auto;margin:0;}

#loginBtn{width:100%;padding:11px;font-size:16px;margin-top:10px;position:relative;}

/* ── SPINNER ── */
.spinner-overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,0.6);
  z-index:999;
  align-items:center;justify-content:center;
  flex-direction:column;gap:16px;
}
.spinner-overlay.show{display:flex;}
.spinner{
  width:54px;height:54px;
  border:5px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-text{color:#fff;font-size:16px;}

/* ── PRINT AREA ── */
#printArea{background:#fff;color:#000;width:280px;margin:auto;padding:20px;text-align:center;border-radius:6px;}
#printLogo{display:block;margin:0 auto 10px auto;max-width:120px;}
#printTitle{font-size:20px;font-weight:bold;margin-bottom:4px;}
#printSub{font-size:14px;margin-bottom:15px;}
#printCounterName{font-size:16px;font-weight:bold;margin-bottom:4px;color:#555;text-transform:uppercase;letter-spacing:1px;}
#printToken{font-size:50px;font-weight:bold;margin:10px 0;}
#printTime{font-size:12px;margin-top:8px;}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .topbar{padding:8px 12px;}
  #clock{font-size:12px;}
  .container{padding:10px;}
  table,thead,tbody,th,td,tr{display:block;}
  thead{display:none;}
  td{border:none;padding:4px 0;}
  td:before{content:attr(data-label)": ";font-weight:bold;color:var(--subtext);font-size:12px;}
  tr{border:1px solid var(--border);border-radius:8px;margin-bottom:10px;padding:10px;}
  button{padding:7px 10px;font-size:13px;}
}

@media print{
  body *{visibility:hidden;}
  #printArea,#printArea *{visibility:visible;}
  #printArea{position:absolute;left:0;right:0;top:0;margin:auto;}
}
</style>
</head>
<body>

<!-- SPINNER -->
<div class="spinner-overlay" id="spinnerOverlay">
  <div class="spinner"></div>
  <div class="spinner-text">Logging in...</div>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div id="clock"></div>
  <button id="themeBtn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
</div>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox" class="card">
    <h2>Token System Login</h2>

    <div class="input-wrap">
      <input id="username" placeholder="Username" autocomplete="username" onkeydown="enterKey(event)">
    </div>

    <div class="input-wrap">
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" onkeydown="enterKey(event)">
      <button class="eye-btn" type="button" onclick="togglePw()" id="eyeBtn">👁</button>
    </div>

    <div class="remember-row">
      <input type="checkbox" id="rememberMe" checked>
      <label for="rememberMe">Remember me</label>
    </div>

    <button id="loginBtn" onclick="login()">Login</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none">

    <div class="card">
      <h3> <button class="logout" onclick="logout()">Logout</button></h3>
      <h3>Ticket Setup</h3>
      <input id="printTitleInput" placeholder="Heading (Example: Clinic Name)" autocomplete="off">
      <input id="printSubInput" placeholder="Sub Heading (Example: Token Service)" autocomplete="off">
      <input type="file" id="logoUpload">
    </div>

    <div class="card">
      <h3>Print Preview</h3>
      <div id="printArea">
        <img id="printLogo" style="display:none">
        <div id="printTitle">Token</div>
        <div id="printSub"></div>
        <div id="printCounterName"></div>
        <div id="printToken">--</div>
        <div id="printTime"></div>
      </div>
      <button onclick="printTicket()">Print Token</button>
      <a href="https://aman5z.github.io/Token_System/TokenDisplay.html" target="_blank"><button type="button" style="background:#8b5cf6;margin-left:8px;">📺 View Display</button></a>
    </div>

    <div class="card">
      <h3>Counters</h3>
      <table id="counterTable"></table>
    </div>

    <div class="card admin-only">
      <h3>Admin Controls</h3>
      <input id="newCounterName" placeholder="New Counter Name" autocomplete="off">
      <button onclick="addCounter()">Add Counter</button>
    </div>

  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzkzFg2BMA0b-bOU-O7Zg9knhfL9-1Pw5QRdHk8NePBYPmZwQjEJeIeTjA9NJc0zcly1A/exec";

let authToken = localStorage.getItem("token");
let role = "";
let printTokenValue = "--";
let printCounterNameValue = "";

/* ── CLOCK ── */
function updateClock(){
  const now = new Date();
  const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const day = days[now.getDay()];
  const month = months[now.getMonth()];
  const date = now.getDate();
  let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  const time = String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")+ampm;
  document.getElementById("clock").innerText = `${day}, ${month} ${date}  ${time}`;
}
setInterval(updateClock, 1000);
updateClock();

/* ── THEME ── */
const savedTheme = localStorage.getItem("theme") || "dark";
document.documentElement.setAttribute("data-theme", savedTheme);
document.getElementById("themeBtn").innerText = savedTheme === "dark" ? "🌙" : "☀️";

function toggleTheme(){
  const btn = document.getElementById("themeBtn");
  btn.classList.remove("spin");
  void btn.offsetWidth;
  btn.classList.add("spin");
  const current = document.documentElement.getAttribute("data-theme");
  const next = current === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("theme", next);
  btn.innerText = next === "dark" ? "🌙" : "☀️";
}

/* ── PASSWORD TOGGLE ── */
function togglePw(){
  const pw = document.getElementById("password");
  pw.type = pw.type === "password" ? "text" : "password";
  document.getElementById("eyeBtn").innerText = pw.type === "password" ? "👁" : "🙈";
}

/* ── ENTER KEY ── */
function enterKey(e){
  if(e.key === "Enter") login();
}

/* ── SPINNER ── */
function showSpinner(){ document.getElementById("spinnerOverlay").classList.add("show"); }
function hideSpinner(){ document.getElementById("spinnerOverlay").classList.remove("show"); }

/* ── JSONP ── */
let cbCount = 0;
function jsonp(params, callback){
  const cbName = "_cb" + (++cbCount);
  window[cbName] = function(data){
    delete window[cbName];
    const el = document.getElementById(cbName);
    if(el) document.head.removeChild(el);
    if(callback) callback(data);
  };
  params.callback = cbName;
  const qs = Object.entries(params).map(([k,v])=>encodeURIComponent(k)+"="+encodeURIComponent(v)).join("&");
  const s = document.createElement("script");
  s.id = cbName;
  s.src = API + "?" + qs;
  document.head.appendChild(s);
}

/* ── LOGIN ── */
function login(){
  showSpinner();
  jsonp({
    action:"login",
    username:document.getElementById("username").value,
    password:document.getElementById("password").value
  }, function(d){
    hideSpinner();
    if(d && d.token){
      const remember = document.getElementById("rememberMe").checked;
      if(remember){
        localStorage.setItem("token", d.token);
      } else {
        sessionStorage.setItem("token", d.token);
        localStorage.removeItem("token");
      }
      authToken = d.token;
      validate();
    } else {
      alert("Login failed. Check username and password.");
    }
  });
}

/* ── INIT ── */
authToken = localStorage.getItem("token") || sessionStorage.getItem("token");
if(authToken) validate();

function validate(){
  jsonp({action:"validate", token:authToken}, function(d){
    if(d && d.valid){
      role = d.role;
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      if(role==="Admin") document.querySelectorAll(".admin-only").forEach(el=>el.style.display="block");
      loadCounters();
    } else {
      logout();
    }
  });
}

/* ── RENDER TABLE ── */
function renderTable(data){
  if(!Array.isArray(data)) return;
  let html = "<tr><th>Name</th><th>Token</th>";
  if(role==="Admin") html += "<th>Actions</th>";
  html += "</tr>";
  for(let i=1;i<data.length;i++){
    const id     = String(data[i][0]);
    const name   = String(data[i][1]);
    const num    = Number(data[i][2]);
    const prefix = data[i][4] ? String(data[i][4]) : String.fromCharCode(64+i);
    const token  = prefix + num;
    html += `<tr>
      <td data-label="Name">${name}</td>
      <td data-label="Token" class="token-number">${token}</td>`;
    if(role==="Admin"){
      html += `<td data-label="Actions">
        <button onclick="clickPrev('${id}','${name}',${num},'${prefix}')">Prev</button>
        <button onclick="clickNext('${id}','${name}',${num},'${prefix}')">Next</button>
        <button onclick="renameCounter('${id}')">Rename</button>
        <button onclick="deleteCounter('${id}')">Delete</button>
        <button style="background:#f59e0b" onclick="clickRepeat('${id}','${name}',${num},'${prefix}')">Repeat</button>
      </td>`;
    }
    html += "</tr>";
  }
  document.getElementById("counterTable").innerHTML = html;
}

/* ── LOAD COUNTERS ── */
function loadCounters(){
  jsonp({action:"getCounters", token:authToken}, function(data){
    if(data) renderTable(data);
  });
}

setInterval(()=>{ if(authToken) loadCounters(); }, 5000);

/* ── UPDATE PRINT PREVIEW ── */
function updatePrintPreview(tokenValue, counterName){
  printTokenValue       = tokenValue;
  printCounterNameValue = counterName;
  document.getElementById("printToken").innerText       = tokenValue;
  document.getElementById("printCounterName").innerText = counterName;
  document.getElementById("printTitle").innerText       = document.getElementById("printTitleInput").value || "Token";
  document.getElementById("printSub").innerText         = document.getElementById("printSubInput").value;
  const now  = new Date();
  const dd   = String(now.getDate()).padStart(2,"0");
  const mm   = String(now.getMonth()+1).padStart(2,"0");
  const yyyy = now.getFullYear();
  document.getElementById("printTime").innerText = `${dd} ${mm} ${yyyy} ${now.toLocaleTimeString()}`;
}

function printTicket(){
  updatePrintPreview(printTokenValue, printCounterNameValue);
  window.print();
}

/* ── LOGO ── */
document.getElementById("logoUpload").addEventListener("change",function(){
  if(!this.files[0]) return;
  const reader = new FileReader();
  reader.onload = function(){
    const img = document.getElementById("printLogo");
    img.src = reader.result;
    img.style.display = "block";
  };
  reader.readAsDataURL(this.files[0]);
});

/* ── COUNTER ACTIONS ── */
function clickNext(id, name, num, prefix){
  updatePrintPreview(prefix + (num + 1), name);
  jsonp({action:"nextToken", token:authToken, counterId:id}, function(){
    setTimeout(loadCounters, 1000);
  });
}

function clickPrev(id, name, num, prefix){
  const newNum = Math.max(1, num - 1);
  updatePrintPreview(prefix + newNum, name);
  jsonp({action:"previousToken", token:authToken, counterId:id}, function(){
    setTimeout(loadCounters, 1000);
  });
}

function clickRepeat(id, name, num, prefix){
  updatePrintPreview(prefix + num, name);
  jsonp({action:"repeatToken", token:authToken, counterId:id}, function(){
    setTimeout(loadCounters, 1000);
  });
}

/* ── ADMIN ACTIONS ── */
function addCounter(){
  jsonp({action:"addCounter", token:authToken, name:document.getElementById("newCounterName").value}, function(){
    document.getElementById("newCounterName").value = "";
    loadCounters();
  });
}

function renameCounter(id){
  const newName = prompt("New name?");
  if(!newName) return;
  jsonp({action:"renameCounter", token:authToken, counterId:id, newName:newName}, function(){ loadCounters(); });
}

function deleteCounter(id){
  if(!confirm("Delete counter?")) return;
  jsonp({action:"deleteCounter", token:authToken, counterId:id}, function(){ loadCounters(); });
}

/* ── LOGOUT ── */
function logout(){
  localStorage.removeItem("token");
  sessionStorage.removeItem("token");
  authToken = null;
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("loginBox").style.display = "block";
}
</script>
</body>
</html>
